name: Safe Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FRONTEND_PORT: 5173
  BACKEND_PORT: 3100

jobs:
  deploy:
    name: Deploy Lili Travel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          echo "✅ SSH configured"

      - name: 🔍 Pre-Deployment Check
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key root@$SERVER_IP << 'ENDSSH'
            echo "Checking server status..."
            
            # Check if project directory exists
            if [ ! -d "/opt/projects/lili-travel" ]; then
              echo "❌ Project directory not found!"
              echo "Please run initial setup first"
              exit 1
            fi
            
            # Check PM2
            if ! command -v pm2 &> /dev/null; then
              echo "❌ PM2 not installed!"
              exit 1
            fi
            
            # Show current PM2 processes
            echo "Current PM2 processes:"
            pm2 list
            
            echo "✅ Pre-deployment checks passed"
          ENDSSH

      - name: 🚀 Deploy Application
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key root@$SERVER_IP << 'ENDSSH'
            set -e
            
            echo "════════════════════════════════════════"
            echo "  Lili Travel Deployment"
            echo "  $(date)"
            echo "════════════════════════════════════════"
            
            cd /opt/projects/lili-travel
            
            # Backup current state
            echo "📦 Creating backup..."
            BACKUP_DIR="/opt/backups/lili-travel-$(date +%Y%m%d-%H%M%S)"
            mkdir -p /opt/backups
            cp -r /opt/projects/lili-travel $BACKUP_DIR
            echo "✅ Backup created: $BACKUP_DIR"
            
            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/master
            git pull origin master
            echo "✅ Code updated"
            
            # Deploy Backend
            echo ""
            echo "🔧 Deploying Backend..."
            cd backend
            
            # Install dependencies
            npm ci --production
            
            # Restart backend
            if pm2 describe lili-backend > /dev/null 2>&1; then
              echo "♻️  Restarting lili-backend..."
              pm2 restart lili-backend --update-env
            else
              echo "🆕 Starting lili-backend..."
              pm2 start server.ts --name lili-backend --interpreter node
            fi
            
            # Wait for backend to start
            sleep 3
            
            # Check backend health
            if curl -f http://localhost:3100 > /dev/null 2>&1; then
              echo "✅ Backend is healthy"
            else
              echo "⚠️  Backend health check failed"
            fi
            
            # Deploy Frontend
            echo ""
            echo "🎨 Deploying Frontend..."
            cd ../frontend
            
            # Install dependencies
            npm ci
            
            # Build frontend
            echo "Building frontend..."
            npm run build
            
            # Restart frontend
            if pm2 describe lili-frontend > /dev/null 2>&1; then
              echo "♻️  Restarting lili-frontend..."
              pm2 restart lili-frontend --update-env
            else
              echo "🆕 Starting lili-frontend..."
              pm2 start server.js --name lili-frontend
            fi
            
            # Wait for frontend to start
            sleep 3
            
            # Check frontend health
            if curl -f http://localhost:5173 > /dev/null 2>&1; then
              echo "✅ Frontend is healthy"
            else
              echo "⚠️  Frontend health check failed"
            fi
            
            # Save PM2 configuration
            pm2 save
            
            echo ""
            echo "════════════════════════════════════════"
            echo "  Deployment Complete!"
            echo "════════════════════════════════════════"
            
            # Show final status
            pm2 list | grep lili-
          ENDSSH

      - name: ✅ Verify Deployment
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key root@$SERVER_IP << 'ENDSSH'
            echo "🔍 Running post-deployment verification..."
            
            # Check PM2 processes are online
            FRONTEND_STATUS=$(pm2 jlist | jq -r '.[] | select(.name=="lili-frontend") | .pm2_env.status')
            BACKEND_STATUS=$(pm2 jlist | jq -r '.[] | select(.name=="lili-backend") | .pm2_env.status')
            
            if [ "$FRONTEND_STATUS" != "online" ]; then
              echo "❌ Frontend is not online!"
              pm2 logs lili-frontend --lines 20 --nostream
              exit 1
            fi
            
            if [ "$BACKEND_STATUS" != "online" ]; then
              echo "❌ Backend is not online!"
              pm2 logs lili-backend --lines 20 --nostream
              exit 1
            fi
            
            echo "✅ All services are online"
            
            # Test endpoints
            if curl -f -s http://localhost:5173 > /dev/null; then
              echo "✅ Frontend responding"
            else
              echo "❌ Frontend not responding"
              exit 1
            fi
            
            if curl -f -s http://localhost:3100 > /dev/null; then
              echo "✅ Backend responding"
            else
              echo "❌ Backend not responding"
              exit 1
            fi
            
            echo ""
            echo "🎉 Deployment verified successfully!"
            echo "Frontend: https://lili-travel.xyz"
            echo "Backend: https://admin.lili-travel.xyz"
          ENDSSH

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          echo "✅ Cleaned up SSH keys"

      - name: 📊 Deployment Summary
        if: success()
        run: |
          echo "════════════════════════════════════════"
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "════════════════════════════════════════"
          echo "Frontend: https://lili-travel.xyz"
          echo "Backend: https://admin.lili-travel.xyz"
          echo "Deployed at: $(date)"
          echo "Commit: ${{ github.sha }}"
          echo "════════════════════════════════════════"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "❌ DEPLOYMENT FAILED"
          echo "════════════════════════════════════════"
          echo "Check logs above for details"
          echo "Backup available on server in /opt/backups"
          echo "To rollback, SSH into server and restore backup"
          echo "════════════════════════════════════════"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment succeeded"
          else
            echo "❌ Deployment failed"
          fi
